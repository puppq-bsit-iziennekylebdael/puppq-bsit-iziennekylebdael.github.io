<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Portfolio Portal</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@700&display=swap">
  <style>
    body { background-color: #fdf3ee; font-family: 'Nunito', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(232, 99, 92, 0.1); width: 100%; max-width: 400px; text-align: center; }
    h2 { font-family: 'Quicksand', sans-serif; color: #5a4a47; margin-bottom: 8px; }
    p { color: #9c8580; font-size: 0.9rem; margin-bottom: 24px; }
    .input-group { text-align: left; margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 700; color: #5a4a47; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 1px solid #fbe7e2; border-radius: 12px; font-size: 0.95rem; outline: none; box-sizing: border-box; }
    input:focus { border-color: #e8635c; }
    .btn-submit { background: #e8635c; color: white; width: 100%; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
    .btn-submit:hover { background: #d44d47; }
    .switch-prompt { font-size: 0.85rem; color: #9c8580; margin-top: 20px; }
    .switch-prompt a { color: #e8635c; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Create Account</h2>
    <p>Register to unlock full collaboration workspace platforms</p>
    <form>
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Sign Up</button>
    </form>
    <div class="switch-prompt">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</body>
</html>
